openapi: 3.0.3
info:
  title: Amazon Orders Service API
  description: |
    Production-ready REST API for managing Amazon orders from BaseLinker with JWT authentication.
    
    ## Key Features:
    - **JWT-based authentication** for secure API access
    - **Fetch confirmed Amazon orders** from BaseLinker API
    - **Store orders and products** in PostgreSQL
    - **Upsert logic** to avoid duplicates
    - **Protect manual business fields** from API overwrites
    - **Filter, search, and paginate** orders
    - **Issues and returns management**
    - **SKU mapping and management** (upload, download, info)
    - **Configurable Google Sheets integration** (enable/disable via env vars)
    - **Auto-populate dimensions** from SKU database
    - **Phone number deduplication** prevents duplicate customers in Google Sheets
    - **Auto-sync new orders** to Google Sheets with status tracking
    
    ## Google Sheets Integration:
    When enabled (GOOGLE_SHEETS_ENABLED=true), the system automatically:
    - Syncs new orders to Google Sheets
    - Extracts last 10 digits from phone numbers (any format)
    - Always uses country code "91" (India)
    - Prevents duplicate phone numbers
      - "interakt_added" - Successfully added to Google Sheets
      - "repeat_customer" - Phone number already exists (duplicate)
      - "phone_number_error" - Invalid/missing phone number
    
    ## Order Details Format:
    Single product: (Qty:1, 32.5 x 48.5 Inch, 1.5mm thick)
    Multiple products: (Qty:1, 36.5 x 60.5 Inch, 1mm thick), (Qty:1, 24.5 x 36.5 Inch, 1mm thick)
    
    ## Environment Variables:
    - GOOGLE_SHEETS_ENABLED=true/false - Enable/disable Google Sheets sync
    - GOOGLE_SHEETS_ID - Google Sheets spreadsheet ID
    - GOOGLE_SHEETS_CREDENTIALS - Path to credentials JSON file
    - SKU_CSV_PATH - Path to SKU mapping CSV file
    
  version: 2.1.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://api.yourdomain.com
    description: Production server

tags:
  - name: Health
    description: Health check endpoints
  - name: Authentication
    description: User authentication and registration
  - name: Orders
    description: Order management operations
  - name: Issues
    description: Order issues management
  - name: Returns
    description: Order returns management
  - name: SKU Management
    description: SKU mapping file management (upload, download, info)

paths:
  /health:
    get:
      summary: Health check
      description: Returns the health status of the service
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/v1/auth/register:
    post:
      summary: Register a new user
      description: Creates a new user account
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: user created successfully
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/login:
    post:
      summary: Login
      description: Authenticates a user and returns a JWT token
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/me:
    get:
      summary: Get current user
      description: Returns the current authenticated user's information
      tags:
        - Authentication
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/orders/import:
    post:
      summary: Import orders from BaseLinker
      description: |
        Fetches and imports confirmed Amazon orders from BaseLinker API.
        
        **Google Sheets Sync (if enabled):**
        - Automatically syncs new orders to Google Sheets
        - Phone numbers are normalized (last 10 digits, country code 91)
        - Duplicate phone numbers are detected and skipped
      tags:
        - Orders
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                date_confirmed_from:
                  type: integer
                  format: int64
                  description: Unix timestamp to fetch orders from (0 for all orders)
                  example: 0
      responses:
        '200':
          description: Orders imported successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  total_fetched:
                    type: integer
                    example: 50
                  total_orders_upserted:
                    type: integer
                    example: 50
                  total_products_upserted:
                    type: integer
                    example: 75
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/orders/import-sample:
    post:
      summary: Import orders from sample file
      description: Imports orders from a local JSON file for testing
      tags:
        - Orders
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - file_path
              properties:
                file_path:
                  type: string
                  example: ./sample_orders.json
      responses:
        '200':
          description: Orders imported successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  total_fetched:
                    type: integer
                    example: 10
                  total_orders_upserted:
                    type: integer
                    example: 10
                  total_products_upserted:
                    type: integer
                    example: 15
        '400':
          description: Bad request - missing file_path
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/orders:
    get:
      summary: List orders
      description: Returns a paginated list of orders with optional filters
      tags:
        - Orders
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 200
          description: Number of items per page
        - name: amazon_order_id
          in: query
          schema:
            type: string
          description: Filter by Amazon order ID
        - name: baselinker_order_id
          in: query
          schema:
            type: integer
          description: Filter by BaseLinker order ID
        - name: order_status_id
          in: query
          schema:
            type: integer
          description: Filter by order status ID
        - name: confirmed
          in: query
          schema:
            type: boolean
          description: Filter by confirmation status
        - name: main_sku
          in: query
          schema:
            type: string
          description: Filter by main product SKU
        - name: phone
          in: query
          schema:
            type: string
          description: Filter by phone number
        - name: delivery_city
          in: query
          schema:
            type: string
          description: Filter by delivery city
        - name: delivery_state
          in: query
          schema:
            type: string
          description: Filter by delivery state
          example: MAHARASHTRA
        - name: return_status
          in: query
          schema:
            type: string
            enum:
              - none
              - returned
              - replacement_placed
              - converted_direct
              - refunded
          description: Filter by return status
          example: returned
        - name: issue_status
          in: query
          schema:
            type: string
            enum:
              - none
              - has_issues
              - replacement_placed
              - converted_direct
              - refunded
          description: Filter by issue status
          example: has_issues
        - name: priority
          in: query
          schema:
            type: string
            enum:
              - normal
              - p1
              - p2
              - p3
          description: Filter by priority
          example: p1
          in: query
          schema:
            type: string
            enum:
              - interakt_added
              - repeat_customer
              - phone_number_error
          description: Filter by WhatsApp sync status
          example: interakt_added
        - name: search
          in: query
          schema:
            type: string
          description: Search across multiple fields
          example: MRC-MR
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AmazonOrder'
                  page:
                    type: integer
                    example: 1
                  limit:
                    type: integer
                    example: 100
                  total:
                    type: integer
                    example: 250
                  total_pages:
                    type: integer
                    example: 3
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/orders/{amazon_order_id}:
    get:
      summary: Get order by ID
      description: Returns a single order with all its products
      tags:
        - Orders
      security:
        - BearerAuth: []
      parameters:
        - name: amazon_order_id
          in: path
          required: true
          schema:
            type: string
          description: Amazon order ID
          example: 403-0840172-6155531
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AmazonOrder'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Update manual fields
      description: Updates manual business fields that are protected from API overwrites
      tags:
        - Orders
      security:
        - BearerAuth: []
      parameters:
        - name: amazon_order_id
          in: path
          required: true
          schema:
            type: string
          description: Amazon order ID
          example: 403-0840172-6155531
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateManualFieldsRequest'
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: updated successfully
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/issues:
    get:
      summary: List orders with issues
      description: Returns a paginated list of orders that have issues
      tags:
        - Issues
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 200
          description: Number of items per page
        - name: issue_status
          in: query
          schema:
            type: string
            enum:
              - none
              - has_issues
              - replacement_placed
              - converted_direct
              - refunded
          description: Filter by issue status
          example: has_issues
        - name: priority
          in: query
          schema:
            type: string
            enum:
              - normal
              - p1
              - p2
              - p3
          description: Filter by priority
          example: p1
        - name: delivery_state
          in: query
          schema:
            type: string
          description: Filter by delivery state
      responses:
        '200':
          description: List of orders with issues
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AmazonOrder'
                  page:
                    type: integer
                    example: 1
                  limit:
                    type: integer
                    example: 100
                  total:
                    type: integer
                    example: 25
                  total_pages:
                    type: integer
                    example: 1
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/returns:
    get:
      summary: List orders with returns
      description: Returns a paginated list of orders that have return status
      tags:
        - Returns
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 200
          description: Number of items per page
        - name: return_status
          in: query
          schema:
            type: string
            enum:
              - none
              - returned
              - replacement_placed
              - converted_direct
              - refunded
          description: Filter by return status
          example: returned
        - name: priority
          in: query
          schema:
            type: string
            enum:
              - normal
              - p1
              - p2
              - p3
          description: Filter by priority
          example: p1
        - name: delivery_state
          in: query
          schema:
            type: string
          description: Filter by delivery state
      responses:
        '200':
          description: List of orders with returns
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AmazonOrder'
                  page:
                    type: integer
                    example: 1
                  limit:
                    type: integer
                    example: 100
                  total:
                    type: integer
                    example: 15
                  total_pages:
                    type: integer
                    example: 1
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/sku/info:
    get:
      summary: Get SKU file information
      description: Returns metadata about the current SKU mapping CSV file
      tags:
        - SKU Management
      security:
        - BearerAuth: []
      responses:
        '200':
          description: SKU file information
          content:
            application/json:
              schema:
                type: object
                properties:
                  file_name:
                    type: string
                    example: SKU_V8.csv
                  file_size:
                    type: integer
                    format: int64
                    example: 245678
                    description: File size in bytes
                  last_modified:
                    type: string
                    format: date-time
                    example: "2024-06-12T10:30:45Z"
                  sku_count:
                    type: integer
                    example: 1256
                    description: Number of SKUs currently loaded in memory
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/sku/download:
    get:
      summary: Download current SKU file
      description: Downloads the current SKU mapping CSV file
      tags:
        - SKU Management
      security:
        - BearerAuth: []
      responses:
        '200':
          description: SKU CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename="SKU_V8.csv"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: SKU file not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/sku/upload:
    post:
      summary: Upload and replace SKU file
      description: |
        Uploads a new SKU mapping CSV file, replaces the existing file, and reloads the SKU mapper.
        
        **CSV File Format:**
        The CSV file must have the following columns:
        - Column 0: SKU (e.g., MRC-MR-0001)
        - Column 1: Thickness (e.g., 1mm, 1.5mm, 2mm, 3mm)
        - Column 2: Dimension (e.g., 12.2 x 24.5 Inch)
        - Column 3: Width in Inches (e.g., 12.2)
        - Column 4: Length in Inches (e.g., 24.5)
        - Column 5: Width in mm (e.g., 310)
        - Column 6: Length in mm (e.g., 622)
        - Column 7: Weight (kg) (e.g., 0.917)
        - Column 8: is_round (values: "yes" or empty)
        
        **After Upload:**
        - SKU mapper is automatically reloaded
        - All new orders will use the updated dimensions
        - Returns count of SKUs loaded
      tags:
        - SKU Management
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: SKU CSV file to upload
      responses:
        '200':
          description: SKU file uploaded and reloaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: SKU file uploaded and reloaded successfully
                  file_name:
                    type: string
                    example: SKU_V8.csv
                  sku_count:
                    type: integer
                    example: 1256
                    description: Number of SKUs loaded from new file
        '400':
          description: Bad request - invalid file or format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'


components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT authentication. Include the token in the Authorization header as "Bearer {token}"

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        username:
          type: string
          example: admin
        email:
          type: string
          example: admin@example.com
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required:
        - username
        - password
        - email
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          example: johndoe
        password:
          type: string
          minLength: 6
          example: SecurePass123!
        email:
          type: string
          format: email
          example: john@example.com

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: admin123

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        expires_at:
          type: integer
          format: int64
          example: 1704096000
        user:
          $ref: '#/components/schemas/User'

    AmazonOrder:
      type: object
      properties:
        amazon_order_id:
          type: string
          example: 403-0840172-6155531
        baselinker_order_id:
          type: integer
          format: int64
          example: 12345678
        shop_order_id:
          type: integer
          format: int64
          example: 98765432
        order_source:
          type: string
          nullable: true
          example: amazon
        order_source_id:
          type: integer
          format: int64
          nullable: true
        order_source_info:
          type: string
          nullable: true
        order_status_id:
          type: integer
          format: int64
          example: 1
        confirmed:
          type: boolean
          example: true
        date_confirmed:
          type: string
          format: date-time
          nullable: true
        date_add:
          type: string
          format: date-time
          nullable: true
        date_in_status:
          type: string
          format: date-time
          nullable: true
        user_login:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
          example: +91-9876543210
          description: Phone number in any format (normalized to last 10 digits for Google Sheets)
        email:
          type: string
          nullable: true
          example: customer@example.com
        user_comments:
          type: string
          nullable: true
        admin_comments:
          type: string
          nullable: true
        currency:
          type: string
          nullable: true
          example: INR
        payment_method:
          type: string
          nullable: true
        payment_method_cod:
          type: string
          nullable: true
        payment_done:
          type: number
          format: double
          example: 1500.00
        delivery_method_id:
          type: integer
          format: int64
          nullable: true
        delivery_method:
          type: string
          nullable: true
        delivery_price:
          type: number
          format: double
          example: 50.00
        delivery_package_module:
          type: string
          nullable: true
        delivery_package_nr:
          type: string
          nullable: true
        delivery_fullname:
          type: string
          nullable: true
          example: John Doe
        delivery_company:
          type: string
          nullable: true
        delivery_address:
          type: string
          nullable: true
          example: 123 Main Street
        delivery_city:
          type: string
          nullable: true
          example: Mumbai
        delivery_state:
          type: string
          nullable: true
          example: MAHARASHTRA
        delivery_postcode:
          type: string
          nullable: true
          example: 400001
        delivery_country_code:
          type: string
          nullable: true
          example: IN
        delivery_country:
          type: string
          nullable: true
          example: India
        delivery_point_id:
          type: string
          nullable: true
        delivery_point_name:
          type: string
          nullable: true
        delivery_point_address:
          type: string
          nullable: true
        delivery_point_postcode:
          type: string
          nullable: true
        delivery_point_city:
          type: string
          nullable: true
        invoice_fullname:
          type: string
          nullable: true
        invoice_company:
          type: string
          nullable: true
        invoice_nip:
          type: string
          nullable: true
        invoice_address:
          type: string
          nullable: true
        invoice_city:
          type: string
          nullable: true
        invoice_state:
          type: string
          nullable: true
        invoice_postcode:
          type: string
          nullable: true
        invoice_country_code:
          type: string
          nullable: true
        invoice_country:
          type: string
